# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.3.0
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  # DEĞİŞTİRİLDİ: Asia/Shanghai → Europe/Istanbul
  # Türkiye UTC+3, sabah özetleri doğru saatte gelsin diye
  timezone: "Europe/Istanbul"
  show_version_update: true


# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  # DEĞİŞTİRİLDİ: false → true
  # Sabah + akşam özet modunu aktif ediyoruz
  enabled: true
  preset: "morning_evening"


# ===============================================================
# 2. 数据源 - 热榜平台
# ===============================================================
platforms:
  # DEĞİŞTİRİLDİ: true → false
  # Varsayılan 11 platform hepsi Çince (Weibo, Douyin, Baidu vs.)
  # Finansal yatırım içeriği için hiçbir değeri yok, kapattık.
  # İleride İngilizce kaynak eklenirse açılabilir.
  enabled: false
  api_url: ""
  sources:
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
      expected_domain: "bilibili.com"
    - id: "cls-hot"
      name: "财联社热门"
      expected_domain: "cls.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"
    - id: "tieba"
      name: "贴吧"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "douyin"
      name: "抖音"
      expected_domain: "douyin.com"
    - id: "zhihu"
      name: "知乎"
      expected_domain: "zhihu.com"


# ===============================================================
# 3. 数据源 - RSS 订阅
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    # Finansal haberler çabuk eskir, 1 gün içindekiler yeterli
    max_age_days: 1

  feeds:
    # --- GLOBAL FİNANS KAYNAKLARI ---

    - id: "yahoo-finance"
      name: "Yahoo Finance"
      url: "https://finance.yahoo.com/news/rssindex"
      # Geniş küresel finans haberleri, ücretsiz ve güvenilir

    - id: "reuters-business"
      name: "Reuters Business"
      url: "https://feeds.reuters.com/reuters/businessNews"
      # Dünya geneli ekonomi haberleri, çok güvenilir kaynak

    - id: "cnbc"
      name: "CNBC Markets"
      url: "https://www.cnbc.com/id/100003114/device/rss/rss.html"
      # Borsa ve piyasa odaklı, ABD merkezli

    - id: "marketwatch"
      name: "MarketWatch"
      url: "https://feeds.marketwatch.com/marketwatch/topstories/"
      # Hisse senetleri, piyasa analizleri

    - id: "seeking-alpha"
      name: "Seeking Alpha"
      url: "https://seekingalpha.com/market_currents.xml"
      # Yatırımcı analizleri ve hisse yorumları

    - id: "ft"
      name: "Financial Times"
      url: "https://www.ft.com/rss/home"
      # Küresel finans ve ekonomi, üst düzey kaynak

    # --- SOSYAL MEDYA / TOPLULUK ---

    - id: "reddit-investing"
      name: "r/investing"
      url: "https://www.reddit.com/r/investing/.rss"
      # Yatırımcı topluluğu, ne konuşuluyor takibi için güçlü
      # Viral içerik fikirleri buradan çıkar

    - id: "reddit-wsb"
      name: "WallStreetBets"
      url: "https://www.reddit.com/r/wallstreetbets/.rss"
      # Spekülatif hareketler, retail yatırımcı nabzı
      # Türkiye'de de takip ediliyor, içerik potansiyeli yüksek

    - id: "reddit-stocks"
      name: "r/stocks"
      url: "https://www.reddit.com/r/stocks/.rss"
      # Daha teknik hisse tartışmaları

    # --- TÜRKÇE KAYNAKLAR ---
    # NOT: Türkçe RSS adresleri değişkendir, çalışmayan olursa
    # enabled: false yaparak devre dışı bırakabilirsin

    - id: "bloomberg-ht"
      name: "Bloomberg HT"
      url: "https://www.bloomberght.com/rss"
      # Türkiye'nin en güvenilir finans haber kaynağı

    - id: "dunya"
      name: "Dünya Gazetesi"
      url: "https://www.dunya.com/rss/rss.xml"
      # BIST ve Türk ekonomisi haberleri


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  # incremental: Sadece YENİ haberler gelir, tekrar yok
  # Sabah rutini için ideal — sıfırdan başlar her gün
  mode: "incremental"

  display_mode: "keyword"

  sort_by_position_first: false

  rank_threshold: 5

  max_news_per_keyword: 0


# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  # keyword modunda bıraktık — AI filtre token harcar
  # frequency_words.txt dosyasına finansal anahtar kelimeler eklemen lazım
  # (ayrıca yapacağız)
  method: "keyword"

  priority_sort_enabled: true


# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis

  regions:
    hotlist: false                 # Platform kapalı olduğu için hotlist da kapalı
    new_items: true                # DEĞİŞTİRİLDİ: Yeni eklenen haberler gösterilsin
    rss: true                     # RSS akışı açık
    standalone: false
    ai_analysis: true             # AI analiz açık (API key gerekiyor, aşağıya bak)

  standalone:
    platforms: []                  # DEĞİŞTİRİLDİ: Çince platformlar kaldırıldı
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true

  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      # BOŞ BIRAKIYORUZ — GitHub Secrets'tan otomatik okunuyor
      # TELEGRAM_BOT_TOKEN ve TELEGRAM_CHAT_ID secret olarak zaten ekledin
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 0

  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  # DeepSeek bıraktık — en ucuz ve yeterince iyi
  # Aylık maliyet: ~1-3 dolar (günlük kullanımla)
  model: "deepseek/deepseek-v4-flash"

  # ⚠️ YAPMAN GEREKEN:
  # https://platform.deepseek.com adresine gir, ücretsiz kayıt ol
  # API Key al → GitHub reponun Settings > Secrets > Actions'a git
  # "AI_API_KEY" adıyla secret olarak ekle
  # Buraya YAZMA, boş bırak
  api_key: ""

  api_base: ""

  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true

  # DEĞİŞTİRİLDİ: Chinese → Turkish
  # AI analiz raporu Türkçe gelsin
  language: "Turkish"
  prompt_file: "ai_analysis_prompt.txt"

  mode: "follow_report"

  max_news_for_analysis: 150

  # DEĞİŞTİRİLDİ: false → true
  # RSS haberlerini de AI analize dahil et
  include_rss: true
  include_standalone: false

  include_rank_timeline: true


# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true

  # DEĞİŞTİRİLDİ: 中文 → Turkish
  # İngilizce RSS başlıkları Türkçeye çevrilsin
  language: "Turkish"
  prompt_file: "ai_translation_prompt.txt"

  scope:
    hotlist: false
    rss: true                     # RSS başlıklarını Türkçeye çevir
    standalone: false


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
