# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.3.0
#              Brom için özelleştirildi - Finansal İçerik
# ═══════════════════════════════════════════════════════════════


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Europe/Istanbul"           # İstanbul saat dilimi
  show_version_update: true


# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: false                        # Her workflow çalışmasında push et
  preset: "morning_evening"


# ===============================================================
# 2. 数据源 - 热榜平台
#
# ÖNEMLI: platforms.enabled: true olmalı, yoksa crawler çalışmıyor!
# Yalnızca 2 Çin FİNANS kaynağı tutuldu (WallStreetCN + CLS).
# Çince başlıklar, frequency_words.txt'teki "ÇİN MAKRO" keyword grubuyla
# yalnızca küresel etkili haberlerde eşleşir; AI ile Türkçeye çevrilip
# ayrı bölüm olarak Telegram'a gider.
# ===============================================================
platforms:
  enabled: true                         # TRUE olmak ZORUNDA - aksi halde sistem başlamıyor
  api_url: ""
  sources:
    # SADECE Çin FİNANS kaynakları tutuldu. Sosyal/genel platformlar
    # (Weibo, Douyin, Zhihu, Bilibili, Baidu, Toutiao, ThePaper, Ifeng,
    # Tieba) kaldırıldı — Türk yatırımcısı için gürültü yaratıyorlardı.
    # Bu iki kaynak Çince başlık döndürür; aşağıdaki Çince makro keyword
    # grubu (frequency_words.txt) ile yalnızca küresel etkili haberler
    # eşleşir ve AI ile Türkçeye çevrilir.
    - id: "wallstreetcn-hot"
      name: "WallStreetCN"
      expected_domain: "wallstreetcn.com"
    - id: "cls-hot"
      name: "CaiLianShe (CLS)"
      expected_domain: "cls.cn"


# ===============================================================
# 3. 数据源 - RSS 订阅 (FİNANSAL KAYNAKLAR)
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    max_age_days: 1                     # Sadece son 24 saatin haberleri

  feeds:
    # ─── Global Wire & Piyasa (Wall Street temel akış) ───
    - id: "yahoo-finance"
      name: "Yahoo Finance"
      url: "https://finance.yahoo.com/news/rssindex"

    - id: "reuters-gnews"
      name: "Reuters"
      # Reuters public RSS'i kapattı; Google News üzerinden site:reuters.com
      url: "https://news.google.com/rss/search?q=site:reuters.com+business+when:1d&hl=en-US&gl=US&ceid=US:en"

    - id: "bloomberg-gnews"
      name: "Bloomberg"
      url: "https://news.google.com/rss/search?q=site:bloomberg.com+markets+when:1d&hl=en-US&gl=US&ceid=US:en"

    - id: "wsj-markets"
      name: "WSJ Markets"
      url: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"

    - id: "cnbc"
      name: "CNBC"
      url: "https://www.cnbc.com/id/100003114/device/rss/rss.html"

    - id: "marketwatch"
      name: "MarketWatch"
      url: "https://feeds.marketwatch.com/marketwatch/topstories/"

    - id: "ft"
      name: "Financial Times"
      url: "https://www.ft.com/rss/home"

    - id: "bbc-business"
      name: "BBC Business"
      url: "https://feeds.bbci.co.uk/news/business/rss.xml"

    # ─── Wall Street profesyonel / hızlı masa ───
    - id: "forexlive"
      name: "ForexLive"
      url: "https://www.forexlive.com/feed/news/"

    - id: "fed-press"
      name: "Federal Reserve"
      url: "https://www.federalreserve.gov/feeds/press_all.xml"

    - id: "zerohedge"
      name: "ZeroHedge"
      url: "https://feeds.feedburner.com/zerohedge/feed"

    - id: "seeking-alpha"
      name: "Seeking Alpha"
      url: "https://seekingalpha.com/market_currents.xml"

    - id: "investing-global"
      name: "Investing.com"
      url: "https://www.investing.com/rss/news.rss"

    # ─── Kripto ───
    - id: "coindesk"
      name: "CoinDesk"
      url: "https://www.coindesk.com/arc/outboundfeeds/rss/"

    - id: "cointelegraph"
      name: "Cointelegraph"
      url: "https://cointelegraph.com/rss"

    # ─── Reddit (perakende yatırımcı duyarlılığı) ───
    - id: "reddit-investing"
      name: "Reddit r/investing"
      url: "https://www.reddit.com/r/investing/.rss"

    - id: "reddit-stocks"
      name: "Reddit r/stocks"
      url: "https://www.reddit.com/r/stocks/.rss"

    - id: "reddit-wsb"
      name: "Reddit WallStreetBets"
      url: "https://www.reddit.com/r/wallstreetbets/.rss"

    # ─── Türk Finans Kaynakları ───
    - id: "bloomberg-ht"
      name: "Bloomberg HT"
      url: "https://www.bloomberght.com/rss"

    - id: "aa-ekonomi"
      name: "AA Ekonomi"
      url: "https://www.aa.com.tr/tr/rss/default?cat=ekonomi"

    - id: "ekonomim"
      name: "Ekonomim"
      url: "https://www.ekonomim.com/rss"

    - id: "investing-tr"
      name: "Investing TR"
      url: "https://tr.investing.com/rss/news.rss"

    - id: "trt-ekonomi"
      name: "TRT Haber Ekonomi"
      url: "https://www.trthaber.com/ekonomi_articles.rss"

    - id: "hurriyet-ekonomi"
      name: "Hürriyet Ekonomi"
      url: "https://www.hurriyet.com.tr/rss/ekonomi"

    - id: "ntv-ekonomi"
      name: "NTV Ekonomi"
      url: "https://www.ntv.com.tr/ekonomi.rss"

    - id: "sabah-ekonomi"
      name: "Sabah Ekonomi"
      url: "https://www.sabah.com.tr/rss/ekonomi.xml"


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "incremental"                   # Sadece yeni haberler, tekrar yok
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0


# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "keyword"                     # frequency_words.txt ile eşleştir
  priority_sort_enabled: true


# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - rss                               # RSS önce (asıl içerik)
    - hotlist                           # Sonra platform haberleri (nadiren eşleşir)
    - ai_analysis                       # En sona AI özeti

  regions:
    hotlist: true                       # Çin finans haberleri ayrı bölüm olarak görünür
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true

  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知 - Telegram
#
# bot_token ve chat_id boş bırakılıyor.
# GitHub Secrets'tan otomatik okunuyor:
#   TELEGRAM_BOT_TOKEN ve TELEGRAM_CHAT_ID
# ===============================================================
notification:
  enabled: true

  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""                     # GitHub Secret: TELEGRAM_BOT_TOKEN
      chat_id: ""                       # GitHub Secret: TELEGRAM_CHAT_ID

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 0

  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"       # DeepSeek V3 (ucuz, güçlü)
  api_key: ""                           # GitHub Secret: AI_API_KEY
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Turkish"                   # Analiz raporu Türkçe
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true                     # RSS haberlerini de analiz et
  include_standalone: false
  include_rank_timeline: false          # Token tasarrufu


# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true
  language: "Turkish"                   # Başlıkları Türkçeye çevir
  prompt_file: "ai_translation_prompt.txt"

  scope:
    hotlist: true                       # Çin finans başlıklarını Türkçeye çevir
    rss: true                           # RSS başlıklarını Türkçeye çevir
    standalone: false


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
