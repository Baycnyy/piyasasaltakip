name: Daily Digest

# Günlük puanlı dijest: tema-tema TÜM haberler + AI 1-5 önem puanı.
# AI yalnızca öneri verir; hiçbir haber elenmez.
#
# - schedule: günde 3 kez (TR saatleri, GitHub cron UTC çalışır → +3)
# - workflow_dispatch: "Run workflow" ile İSTEDİĞİN ZAMAN elle çalıştır

on:
  schedule:
    - cron: "30 5 * * *"    # 08:30 İstanbul — gece ABD kapanışı + Asya + sabah
    - cron: "0 10 * * *"    # 13:00 İstanbul — BIST sabah seansı + Avrupa
    - cron: "0 17 * * *"    # 20:00 İstanbul — BIST kapanışı + ABD seansı
  workflow_dispatch:

concurrency:
  group: digest-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Verify required files
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar --digest
